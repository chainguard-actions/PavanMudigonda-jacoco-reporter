name: Test coverage below minimum threshold fails action
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &>/dev/null; then
            apt-get update -y && apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
            dpkg -i packages-microsoft-prod.deb
            apt-get update -y && apt-get install -y powershell
          fi
          pwsh --version

      # The test.xml file has less than 100% coverage; setting minimum to 100 with
      # fail_below_threshold=true should cause the action step to fail.
      - id: jacoco
        uses: .
        continue-on-error: true
        with:
          coverage_results_path: ${{ github.workspace }}/jacoco-report/test.xml
          coverage_report_name: Coverage-Threshold-Fail
          coverage_report_title: JaCoCo Threshold Fail
          github_token: ${{ github.token }}
          skip_check_run: "true"
          minimum_coverage: 100
          fail_below_threshold: "true"
          publish_only_summary: "true"

      - name: Assert action failed due to coverage below threshold
        env:
          OUTCOME: ${{ steps.jacoco.outcome }}
          COVERAGE: ${{ steps.jacoco.outputs.coverage_percentage }}
        run: |
          echo "action outcome: $OUTCOME"
          echo "coverage_percentage: $COVERAGE"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when coverage is below 100% threshold, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when coverage was below threshold"
