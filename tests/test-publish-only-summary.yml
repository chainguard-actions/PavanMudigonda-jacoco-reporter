name: Test publish_only_summary mode
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &>/dev/null; then
            apt-get update -y && apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
            dpkg -i packages-microsoft-prod.deb
            apt-get update -y && apt-get install -y powershell
          fi
          pwsh --version

      - id: jacoco
        uses: .
        with:
          coverage_results_path: ${{ github.workspace }}/jacoco-report/test.xml
          coverage_report_name: Coverage-Summary
          coverage_report_title: JaCoCo Summary Only
          github_token: ${{ github.token }}
          skip_check_run: "true"
          publish_only_summary: "true"

      - name: Assert coverage_percentage output is a valid number
        env:
          ACTUAL: ${{ steps.jacoco.outputs.coverage_percentage }}
        run: |
          echo "coverage_percentage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: coverage_percentage output is empty"
            exit 1
          fi
          # Verify it looks like a number (possibly with decimals)
          if ! echo "$ACTUAL" | grep -qE '^[0-9]+(\.[0-9]+)?$'; then
            echo "FAIL: coverage_percentage '$ACTUAL' is not a valid number"
            exit 1
          fi
          echo "PASS: coverage_percentage=$ACTUAL is a valid number"

      - name: Assert total_lines is a positive integer
        env:
          ACTUAL: ${{ steps.jacoco.outputs.total_lines }}
        run: |
          echo "total_lines: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: total_lines output is empty"
            exit 1
          fi
          if ! echo "$ACTUAL" | grep -qE '^[0-9]+$'; then
            echo "FAIL: total_lines '$ACTUAL' is not a valid integer"
            exit 1
          fi
          if [ "$ACTUAL" -le 0 ]; then
            echo "FAIL: total_lines should be positive, got $ACTUAL"
            exit 1
          fi
          echo "PASS: total_lines=$ACTUAL"
