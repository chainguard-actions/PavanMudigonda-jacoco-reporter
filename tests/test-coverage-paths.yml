name: Test coverage_paths input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &>/dev/null; then
            apt-get update -y
            apt-get install -y powershell || true
          fi
          if ! command -v pwsh &>/dev/null; then
            snap install powershell --classic || true
          fi
          if ! command -v pwsh &>/dev/null; then
            curl -sSL https://packages.microsoft.com/keys/microsoft.asc | apt-key add -
            OS_VERSION=$(. /etc/os-release && echo "$VERSION_ID")
            curl -sSL "https://packages.microsoft.com/config/ubuntu/${OS_VERSION}/packages-microsoft-prod.deb" -o /tmp/packages-microsoft-prod.deb
            dpkg -i /tmp/packages-microsoft-prod.deb
            apt-get update -y
            apt-get install -y powershell
          fi
          pwsh --version

      - id: jacoco
        uses: .
        with:
          coverage_results_path: ${{ github.workspace }}/tests/fixtures/coverage-90pct.xml
          coverage_paths: src,lib
          coverage_report_name: Coverage-Paths-Test
          coverage_report_title: JaCoCo Coverage Paths Report
          skip_check_run: "true"
          minimum_coverage: 80
          fail_below_threshold: "false"
          publish_only_summary: "true"

      - name: Assert coverage_percentage is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.coverage_percentage }}
        run: |
          echo "coverage_percentage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: coverage_percentage output is empty"
            exit 1
          fi
          echo "PASS: coverage_percentage=$ACTUAL"

      - name: Assert total_lines is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.total_lines }}
        run: |
          echo "total_lines: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: total_lines output is empty"
            exit 1
          fi
          echo "PASS: total_lines=$ACTUAL"
