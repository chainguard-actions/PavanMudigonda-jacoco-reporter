name: Test coverage_paths input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PowerShell
        run: |
          if ! command -v pwsh &>/dev/null; then
            apt-get update -y && apt-get install -y wget apt-transport-https software-properties-common
            wget -q "https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/packages-microsoft-prod.deb"
            dpkg -i packages-microsoft-prod.deb
            apt-get update -y && apt-get install -y powershell
          fi
          pwsh --version

      - id: jacoco
        uses: .
        with:
          coverage_results_path: ${{ github.workspace }}/jacoco-report/test.xml
          coverage_paths: jacoco-report,_init
          coverage_report_name: Coverage-Paths
          coverage_report_title: JaCoCo Coverage Paths Test
          github_token: ${{ github.token }}
          skip_check_run: "true"
          minimum_coverage: 50
          fail_below_threshold: "false"
          publish_only_summary: "true"

      - name: Assert coverage_percentage is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.coverage_percentage }}
        run: |
          echo "coverage_percentage: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: coverage_percentage output is empty"
            exit 1
          fi
          echo "PASS: coverage_percentage=$ACTUAL"

      - name: Assert covered_lines is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.covered_lines }}
        run: |
          echo "covered_lines: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: covered_lines output is empty"
            exit 1
          fi
          echo "PASS: covered_lines=$ACTUAL"

      - name: Assert missed_lines is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.missed_lines }}
        run: |
          echo "missed_lines: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: missed_lines output is empty"
            exit 1
          fi
          echo "PASS: missed_lines=$ACTUAL"

      - name: Assert total_lines is set
        env:
          ACTUAL: ${{ steps.jacoco.outputs.total_lines }}
        run: |
          echo "total_lines: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: total_lines output is empty"
            exit 1
          fi
          echo "PASS: total_lines=$ACTUAL"
